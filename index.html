<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peppa 直播</title>
<style>
  :root {
    --bg: #000000;
    --accent: #ffd23f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    background: var(--bg);
  }
  #yt-player-host {
    position: absolute; inset: 0;
  }
  #yt-player-host iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }

  /* Single play/pause glyph, flashed briefly on every tap */
  #pause-glyph {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    width: 84px; height: 84px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    border: 1.5px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease, transform 200ms ease;
  }
  #pause-glyph.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #pause-glyph svg { width: 34px; height: 34px; fill: var(--accent); }

  #boot {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
    background: #000;
    z-index: 10;
    transition: opacity 400ms ease;
  }
  #boot.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid rgba(255,255,255,0.18);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #boot-text { color: rgba(255,255,255,0.55); font-size: 13px; letter-spacing: 0.02em; text-align: center; padding: 0 30px; }
</style>
</head>
<body>

<div id="stage">
  <div id="yt-player-host"></div>

  <div id="pause-glyph">
    <svg id="pause-glyph-icon" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </div>

  <div id="boot">
    <div class="spinner"></div>
    <div id="boot-text">Loading episode…</div>
  </div>
</div>

<script>
  // ---- Config ----
  var VIDEO_IDS = [
    "_PnbRwLr7WA",
    "Wi1fKCIzu6s",
    "0Rs0AgN6td0",
    "FDymSSGPfrQ",
    "N-5EeX8I_Bk",
    "vTeLphnQgE8",
    "klcHoJaFmt0",
    "QTwx6qJ5jUA",
    "R76nr5cjklw",
    "YGjxvtFTJQA",
    "lC_I8u9YwY8"
  ];
  var PLAYBACK_RATE = 0.85;
  var lastVideoId = null;

  function pickRandomVideoId() {
    if (VIDEO_IDS.length === 1) return VIDEO_IDS[0];
    var candidate;
    do {
      candidate = VIDEO_IDS[Math.floor(Math.random() * VIDEO_IDS.length)];
    } while (candidate === lastVideoId);
    lastVideoId = candidate;
    return candidate;
  }

  // ---- Load YouTube IFrame API ----
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  var player = null;
  var apiReady = false;
  var isPlaying = true;

  var boot = document.getElementById('boot');
  var bootText = document.getElementById('boot-text');
  var glyph = document.getElementById('pause-glyph');
  var glyphIcon = document.getElementById('pause-glyph-icon');

  var ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  var ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  // If the API script itself never loads/fires (network, blocked script,
  // whatever) within 8s, say so instead of spinning forever.
  var apiTimeout = setTimeout(function() {
    if (!apiReady) {
      bootText.textContent = "Couldn't start player — check connection and reload the app.";
    }
  }, 8000);

  window.onYouTubeIframeAPIReady = function() {
    apiReady = true;
    clearTimeout(apiTimeout);
    player = new YT.Player('yt-player-host', {
      width: '100%',
      height: '100%',
      videoId: pickRandomVideoId(),
      playerVars: {
        autoplay: 1,
        controls: 0,
        disablekb: 1,
        fs: 0,
        iv_load_policy: 3,
        modestbranding: 1,
        playsinline: 1,
        rel: 0
      },
      events: {
        onReady: onPlayerReady,
        onStateChange: onPlayerStateChange,
        onError: onPlayerError
      }
    });
  };

  function onPlayerReady(e) {
    try { e.target.setPlaybackRate(PLAYBACK_RATE); } catch (err) {}
    e.target.playVideo();
    boot.classList.add('hidden');
  }

  function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      isPlaying = true;
      boot.classList.add('hidden');
      // Re-assert playback rate — YouTube sometimes resets it on
      // (re)buffer or quality change.
      try { player.setPlaybackRate(PLAYBACK_RATE); } catch (err) {}
    } else if (e.data === YT.PlayerState.PAUSED) {
      isPlaying = false;
    } else if (e.data === YT.PlayerState.BUFFERING) {
      // Don't show the full boot screen for ordinary buffering blips —
      // only the persistent connect/error state needs that.
    } else if (e.data === YT.PlayerState.ENDED) {
      var nextId = pickRandomVideoId();
      boot.classList.remove('hidden');
      bootText.textContent = 'Loading next episode…';
      player.loadVideoById(nextId);
    }
  }

  function onPlayerError(e) {
    bootText.textContent = 'Stream unavailable. Tap to retry.';
    boot.classList.remove('hidden');
  }

  // ---- Single tap anywhere: toggle play/pause ----
  function flashGlyph(playing) {
    glyphIcon.innerHTML = playing ? ICON_PAUSE : ICON_PLAY;
    glyph.classList.add('show');
    clearTimeout(flashGlyph._t);
    flashGlyph._t = setTimeout(function() {
      glyph.classList.remove('show');
    }, 650);
  }

  document.getElementById('stage').addEventListener('click', function() {
    if (!player || !apiReady) {
      // Not ready yet — if we're showing the error state, treat a tap
      // as a manual retry.
      if (!boot.classList.contains('hidden')) {
        location.reload();
      }
      return;
    }
    if (isPlaying) {
      player.pauseVideo();
      flashGlyph(false);
    } else {
      player.playVideo();
      flashGlyph(true);
    }
  });

  // ---- Keyboard fallback for desktop testing ----
  document.addEventListener('keydown', function(ev) {
    if (ev.code === 'Space' || ev.code === 'Enter') {
      ev.preventDefault();
      document.getElementById('stage').click();
    }
  });
</script>
</body>
</html>
